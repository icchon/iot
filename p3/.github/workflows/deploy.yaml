name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v.*' # v0.1.0 などのタグがプッシュされたら起動

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Docker Hub へのログイン (Secretsを使用)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. Docker イメージのビルド & プッシュ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ここは自分のIDを直接書いてOK（Secretから ${{ secrets.DOCKER_USERNAME }} でも可）
          tags: ${{ secrets.DOCKER_USERNAME }}/iot:${{ github.ref_name }}

      # 3. Kubernetes デプロイメント YAML の更新
      - name: Update Deployment YAML
        run: |
          export NEW_TAG=${{ github.ref_name }}
          # app/ 以下のすべての .yaml ファイル内の :v.x.x を置換
          find app/ -name "*.yaml" -exec sed -i "s|:v\.[0-9.]*|:${NEW_TAG}|g" {} +

      # 4. 変更を main ブランチに push する
      - name: Commit and Push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add k8s/
          git commit -m "chore: update image tag to ${{ github.ref_name }} [skip ci]"
          git push origin main
