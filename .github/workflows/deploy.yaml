name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v*' # v1.0.0 や v0.1.0 などのタグに対応

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [app1, app2, app3, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Docker Hub へのログイン
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. 各アプリのイメージをビルド & プッシュ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./p3/apps/${{ matrix.app }}
          push: true
          # イメージ名は icchondocker/vote-app1:v0.1.0 の形式
          tags: ${{ secrets.DOCKER_USERNAME }}/vote-${{ matrix.app }}:${{ github.ref_name }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=/api

  update-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Kubernetes デプロイメント YAML の更新 (イメージタグの書き換え)
      - name: Update Deployment YAML
        run: |
          export NEW_TAG=${{ github.ref_name }}
          # p3/k8s/app 以下のすべての .yaml ファイル内のイメージタグ (:v.1.0 等) を置換
          find p3/k8s/app/ -name "*.yaml" -exec sed -i "s|:v\.[0-9.]*|:${NEW_TAG}|g" {} +

      # 4. 変更を main ブランチに push する
      - name: Commit and Push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add p3/k8s/
          git commit -m "chore: update image tag to ${{ github.ref_name }} [skip ci]" || echo "No changes to commit"
          git push origin main
