apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
        }
        # IPではなくサービス名に書き換える
        rewrite name gitlab.k8s.icchon.jp gitlab-nginx-ingress-controller.gitlab.svc.cluster.local
        rewrite name registry.k8s.icchon.jp gitlab-nginx-ingress-controller.gitlab.svc.cluster.local
        rewrite name minio.k8s.icchon.jp gitlab-nginx-ingress-controller.gitlab.svc.cluster.local
        
        prometheus :9153
        forward . 8.8.8.8
        cache 30
        loop
        reload
        loadbalance
    }
